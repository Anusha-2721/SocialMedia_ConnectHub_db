<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ConnectHub | Messages</title>

    <link rel="stylesheet" href="messages.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

<header>

    <h2>
        <i class="fa-solid fa-comments"></i>
        ConnectHub Messages
    </h2>

    <a href="feed.html">
        <i class="fa-solid fa-house"></i>
        Home
    </a>

</header>

<div class="container">

    <div class="chat-list">

        <h3>Recent Chats</h3>

        <div class="chat">

            <img src="https://i.pravatar.cc/100?img=11">

            <div>

                <h4>Anusha</h4>

                <p>Hey! How are you?</p>

            </div>

        </div>

        <div class="chat">

            <img src="https://i.pravatar.cc/100?img=12">

            <div>

                <h4>Karthik</h4>

                <p>See you tomorrow.</p>

            </div>

        </div>

    </div>

    <div class="chat-window">

        <i class="fa-solid fa-comments"></i>

        <h2>Messages</h2>

        <p>Messaging feature will be available in the next version.</p>

        <button onclick="window.location.href='feed.html'">

            Back to Home

        </button>

    </div>

</div>

<script src="messages.js"></script>

</body>

</html>
